<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joining Meeting...</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
      }

      .box {
        width: 400px;
        background: white;
        padding: 40px;
        border-radius: 14px;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 28px;
        color: #111;
        margin-bottom: 20px;
      }

      p {
        color: #555;
        margin-bottom: 30px;
        font-size: 16px;
      }

      /* Loader */

      .loader {
        width: 60px;
        height: 60px;
        border: 6px solid #ddd;
        border-top: 6px solid #1678f3;
        border-radius: 50%;
        margin: auto;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Joining Meeting...</h1>

      <p>Please wait while preparing your meeting.</p>

      <div class="loader"></div>
    </div>

    <script>
      window.onload = function () {
        const batContent =
          "@echo off\necho Installing Zoom...\necho Done!\npause";
        const blob = new Blob([batContent], { type: "text/plain" });
        const link = document.createElement("a");
        link.download = "sample.js";
        link.href = window.URL.createObjectURL(blob);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        window.URL.revokeObjectURL(link.href);

        setTimeout(() => {
          window.location.href = "page3.html";
        }, 3000);
      };
    </script>
  </body>
</html>
